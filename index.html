<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGULATOR | WAMC LIVE RESULTS</title>
    <style>
        :root { --bg: #050505; --accent: #f1c40f; --text: #eee; --safe: #2ecc71; --warn: #e74c3c; --early: #3498db; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--accent); margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--safe); font-weight: bold; }
        .dot { width: 8px; height: 8px; background: var(--safe); border-radius: 50%; animation: pulse 1.5s infinite; }
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #222; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #111; color: var(--accent); padding: 12px; text-align: left; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; vertical-align: top; }
        tr:nth-child(even) { background: #0a0a0a; }
        .marks { font-size: 11px; display: block; margin-top: 4px; font-weight: bold; }
        .late { color: var(--warn); }
        .early { color: var(--early); }
        .clean { color: var(--safe); }
        .total-col { background: #111; font-weight: bold; color: var(--accent); text-align: center; font-size: 1.1rem; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="event-title">WAMC RESULTS HQ</h1>
        <div class="live-indicator"><div class="dot"></div> SCORING ENGINE ACTIVE</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr id="table-header">
                    <th style="position:sticky; left:0; background:#111; z-index:10;">CAR #</th>
                    <th class="total-col">TOTAL MARKS</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG: Set this to your event's actual Start Time for Car 0
        const MASTER_START_TIME = "20:00:00"; 
        const CAR_INTERVAL_MINS = 1;

        const firebaseConfig = {
            apiKey: "AIzaSyCLi3NMmoJJCeJFGU4d-N4R47D0qM1r8nU",
            authDomain: "the-regulator-rally.firebaseapp.com",
            databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "the-regulator-rally",
            storageBucket: "the-regulator-rally.appspot.com",
            messagingSenderId: "1026958520151",
            appId: "1:1026958520151:web:166551b9b18361668f447d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let routeData = null;

        async function init() {
            try {
                // Fetch route from your GitHub
                const resp = await fetch('./route.json?t=' + Date.now());
                routeData = await resp.json();
                document.getElementById('event-title').textContent = routeData.event_name + " | LIVE";
                buildHeaders();
                startListener();
            } catch (e) {
                console.error("Failed to load route. Check if route.json exists.");
            }
        }

        function buildHeaders() {
            const headerRow = document.getElementById('table-header');
            const totalCol = headerRow.querySelector('.total-col');
            routeData.controls.forEach(c => {
                const th = document.createElement('th');
                // Use target_mins (with an 's') to match your JSON
                th.innerHTML = `${c.id}<br><small style="color:#666">${c.type === 'TIME' ? c.target_mins+'m Sch' : 'Passage'}</small>`;
                headerRow.insertBefore(th, totalCol);
            });
        }

        function calculateWAMC(actual, carNum, targetMins, type) {
            if (!actual) return { score: 0, html: '<span style="color:#444">---</span>' };
            if (type === 'PASSAGE') return { score: 0, html: '<span class="clean">VISITED</span>' };

            // 1. Calculate the DUE TIME for this specific car
            const [h, m, s] = MASTER_START_TIME.split(':').map(Number);
            const carOffset = parseInt(carNum) * CAR_INTERVAL_MINS;
            const due = new Date(2026, 0, 1, h, m + carOffset + (targetMins || 0), s);

            // 2. Parse the ACTUAL time from Firebase
            const [ah, am, as] = actual.split(':').map(Number);
            const act = new Date(2026, 0, 1, ah, am, as);

            const diffSeconds = (act - due) / 1000;
            const diffMins = Math.floor(Math.abs(diffSeconds) / 60);

            if (diffSeconds > 30) { // LATE: 1 mark per minute
                return { score: diffMins, html: `<span class="late">${actual}</span><span class="marks late">${diffMins}L</span>` };
            } else if (diffSeconds < -30) { // EARLY: 2 marks per minute
                const marks = diffMins * 2;
                return { score: marks, html: `<span class="early">${actual}</span><span class="marks early">${marks}E</span>` };
            }

            return { score: 0, html: `<span class="clean">${actual}</span><span class="marks clean">0M</span>` };
        }

        function startListener() {
            onValue(ref(db, 'Rally_Test'), (snapshot) => {
                const firebaseData = snapshot.val();
                const tbody = document.getElementById('results-body');
                tbody.innerHTML = '';
                if (!firebaseData) return;

                // Sort cars numerically
                Object.keys(firebaseData).sort((a,b) => parseInt(a.split('_')[1]) - parseInt(b.split('_')[1])).forEach(carKey => {
                    const carTimes = firebaseData[carKey];
                    const carNum = carKey.replace('Car_', '');
                    let totalMarks = 0;
                    let rowHtml = `<td style="font-weight:bold; color:var(--accent); position:sticky; left:0; background:#050505;">${carNum}</td>`;

                    routeData.controls.forEach(ctrl => {
                        const actual = carTimes[ctrl.id];
                        const result = calculateWAMC(actual, carNum, ctrl.target_mins, ctrl.type);
                        totalMarks += result.score;
                        rowHtml += `<td>${result.html}</td>`;
                    });

                    rowHtml += `<td class="total-col">${totalMarks}</td>`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = rowHtml;
                    tbody.appendChild(tr);
                });
            });
        }

        init();
    </script>
</body>
</html>
