<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSTAMPED | LIVE RESULTS</title>
    <style>
        :root { --bg: #050505; --accent: #f1c40f; --text: #eee; --safe: #2ecc71; --empty: #333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .live-indicator { font-size: 10px; color: var(--safe); font-weight: bold; animation: blink 2s infinite; }
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #222; border-radius: 4px; background: #0a0a0a; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #111; color: var(--accent); padding: 12px; text-align: left; font-size: 10px; border-bottom: 2px solid #222; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; }
        .stamp-time { color: var(--safe); font-weight: bold; }
        .stamp-missing { color: var(--empty); }
        .total-count { background: #111; font-weight: bold; color: var(--accent); text-align: center; border-left: 2px solid #222; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 id="event-title" style="font-size:1.2rem; margin:0; color:var(--accent);">SYNCING ROUTE...</h1>
            <div id="status-text" style="font-size:10px; color:#666; margin-top:5px;">Initializing Geoscatter Engine...</div>
        </div>
        <div class="live-indicator">● LIVE FROM FIELD</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr id="table-header">
                    <th style="position:sticky; left:0; background:#111; z-index:10;">CAR</th>
                    <th class="total-count">VISITS</th>
                </tr>
            </thead>
            <tbody id="results-body">
                <tr><td colspan="2" style="text-align:center; padding:40px; color:#444;">Awaiting Signal...</td></tr>
            </tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLi3NMmoJJCeJFGU4d-N4R47D0qM1r8nU",
        authDomain: "the-regulator-rally.firebaseapp.com",
        databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "the-regulator-rally",
        storageBucket: "the-regulator-rally.appspot.com",
        messagingSenderId: "1026958520151",
        appId: "1:1026958520151:web:166551b9b18361668f447d"
    };

    // This must match the INTERNAL_ROUTE in your tracker app
    const ROUTE_CONFIG = {
        "event_name": "GEOSTAMP v5.1",
        "controls": [
            { "id": "START (Home)", "type": "START" },
            { "id": "PC 1", "type": "PC" },
            { "id": "Scatter 1", "type": "SCATTER" },
            { "id": "FINISH", "type": "FINISH" }
        ]
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function initTable() {
        document.getElementById('event-title').textContent = ROUTE_CONFIG.event_name;
        const hRow = document.getElementById('table-header');
        const totalTh = hRow.querySelector('.total-count');
        
        ROUTE_CONFIG.controls.forEach(c => {
            const th = document.createElement('th');
            th.innerHTML = `${c.id}<br><small style="color:#666">${c.type}</small>`;
            hRow.insertBefore(th, totalTh);
        });
        
        startListening();
    }

    function startListening() {
        // Listening to the new "GEOSCATTER" node
        onValue(ref(db, 'GEOSCATTER'), (snap) => {
            const data = snap.val();
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';

            if (!data) {
                tbody.innerHTML = '<tr><td colspan="20" style="text-align:center; padding:40px; color:#444;">NO DATA RECEIVED YET</td></tr>';
                return;
            }

            // Sort cars numerically
            const sortedCars = Object.keys(data).sort((a, b) => {
                const nA = parseInt(a.replace(/\D/g, '')) || 0;
                const nB = parseInt(b.replace(/\D/g, '')) || 0;
                return nA - nB;
            });

            sortedCars.forEach(carKey => {
                const carData = data[carKey];
                const carDisplay = carKey.replace('Car_', '');
                let visitCount = 0;
                
                let rowHtml = `<td style="font-weight:bold; color:var(--accent); position:sticky; left:0; background:#0a0a0a; border-right:1px solid #222;">${carDisplay}</td>`;

                ROUTE_CONFIG.controls.forEach(control => {
                    const record = carData[control.id]; // Access by Control ID
                    if (record && record.time) {
                        visitCount++;
                        rowHtml += `<td><span class="stamp-time">${record.time}</span><br><small style="font-size:9px; color:#555">${record.miles}m</small></td>`;
                    } else {
                        rowHtml += `<td><span class="stamp-missing">---</span></td>`;
                    }
                });

                rowHtml += `<td class="total-count">${visitCount} / ${ROUTE_CONFIG.controls.length}</td>`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });

            document.getElementById('status-text').textContent = `LAST UPDATE: ${new Date().toLocaleTimeString()}`;
        });
    }

    initTable();
</script>
</body>
</html>
