<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGULATOR | LIVE RESULTS HQ</title>
    <style>
        :root { --bg: #050505; --accent: #f1c40f; --text: #eee; --safe: #2ecc71; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--accent); margin: 0; font-size: 1.4rem; letter-spacing: 2px; }
        
        .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--safe); font-weight: bold; }
        .dot { width: 8px; height: 8px; background: var(--safe); border-radius: 50%; animation: pulse 1.5s infinite; }

        .table-container { width: 100%; overflow-x: auto; border: 1px solid #222; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #111; color: var(--accent); padding: 12px; text-align: left; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 14px; }
        tr:nth-child(even) { background: #0a0a0a; }

        .time-cell { color: var(--safe); font-weight: bold; }
        .pending { color: #444; font-style: italic; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>RESULTS HQ</h1>
        <div class="live-indicator"><div class="dot"></div> LIVE FROM CLOUD</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="position:sticky; left:0; background:#111;">CAR #</th>
                    <th>TC 1</th>
                    <th>PC 1</th>
                    <th>TC 2</th>
                    <th>PC 2</th>
                </tr>
            </thead>
            <tbody id="results-body">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Config from the screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyCLi3NMmoJJCeJFGU4d-N4R47D0qM1r8nU",
            authDomain: "the-regulator-rally.firebaseapp.com",
            databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "the-regulator-rally",
            storageBucket: "the-regulator-rally.appspot.com",
            messagingSenderId: "1026958520151",
            appId: "1:1026958520151:web:166551b9b18361668f447d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const rallyRef = ref(db, 'Rally_Test');

        // LISTEN FOR CHANGES (Real-time)
        onValue(rallyRef, (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = ''; // Clear for fresh render

            if (!data) return;

            // Loop through each car found in the database
            Object.keys(data).forEach(carKey => {
                const carData = data[carKey];
                const carNum = carKey.replace('Car_', '');
                
                const row = `
                    <tr>
                        <td style="font-weight:bold; color:var(--accent); position:sticky; left:0; background:#050505;">${carNum}</td>
                        <td class="${carData['TC 1'] ? 'time-cell' : 'pending'}">${carData['TC 1'] || '---'}</td>
                        <td class="${carData['PC 1'] ? 'time-cell' : 'pending'}">${carData['PC 1'] || '---'}</td>
                        <td class="${carData['TC 2'] ? 'time-cell' : 'pending'}">${carData['TC 2'] || '---'}</td>
                        <td class="${carData['PC 2'] ? 'time-cell' : 'pending'}">${carData['PC 2'] || '---'}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        });
    </script>
</body>
</html>
