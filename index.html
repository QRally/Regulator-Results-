<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSTAMP LIVE RESULTS</title>
    <style>
        :root { --bg: #050505; --accent: #f1c40f; --text: #eee; --safe: #2ecc71; --empty: #333; --danger: #e74c3c; }
        body { font-family: monospace; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .live-indicator { font-size: 10px; color: var(--safe); font-weight: bold; animation: blink 2s infinite; }
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #222; border-radius: 4px; background: #0a0a0a; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; } 
        th { background: #111; color: var(--accent); padding: 12px; text-align: left; font-size: 10px; border-bottom: 2px solid #222; text-transform: uppercase; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; white-space: nowrap; }
        .sticky-col { position: sticky; left: 0; background: #0a0a0a; z-index: 10; border-right: 1px solid #222; font-weight: bold; color: var(--accent); }
        .stamp-time { color: var(--safe); font-weight: bold; }
        .total-count { background: #111; font-weight: bold; color: var(--accent); text-align: center; border-left: 2px solid #222; }
        .violation-row { background: rgba(231, 76, 60, 0.15) !important; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 id="event-title" style="font-size:1.2rem; margin:0; color:var(--accent);">SYNCING...</h1>
            <div id="status-text" style="font-size:10px; color:#666; margin-top:5px;">Connecting to GEOSCATTER...</div>
        </div>
        <div class="live-indicator">● LIVE RESULTS</div>
    </div>
    <div class="table-container">
        <table>
            <thead><tr id="table-header"><th class="sticky-col">CAR</th><th class="total-count">VISITS</th></tr></thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLi3NMmoJJCeJFGU4d-N4R47D0qM1r8nU",
        authDomain: "the-regulator-rally.firebaseapp.com",
        databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "the-regulator-rally",
        storageBucket: "the-regulator-rally.appspot.com",
        messagingSenderId: "1026958520151",
        appId: "1:1026958520151:web:166551b9b18361668f447d"
    };

    const ROUTE_CONFIG = {
        "event_name": "GeoStamp",
        "controls": [
            { "id": "START", "type": "START" },
            { "id": "S1", "type": "SCATTER" },
            { "id": "S2", "type": "SCATTER" },
            { "id": "CONTROL X", "type": "BLACKSPOT" },
            { "id": "CONTROL 1", "type": "SCATTER" },
            { "id": "CONTROL 2", "type": "SCATTER" },
            { "id": "CONTROL 3", "type": "SCATTER" },
            { "id": "CONTROL 4", "type": "SCATTER" },
            { "id": "CONTROL 5", "type": "SCATTER" },
            { "id": "CONTROL 6", "type": "SCATTER" },
            { "id": "PC 1", "type": "PC" },
            { "id": "PC 2", "type": "PC" },
            { "id": "PC 3", "type": "PC" },
            { "id": "PC 4", "type": "PC" },
            { "id": "FINISH", "type": "FINISH" }
        ]
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function initTable() {
        document.getElementById('event-title').textContent = ROUTE_CONFIG.event_name;
        const hRow = document.getElementById('table-header');
        const totalTh = hRow.querySelector('.total-count');
        ROUTE_CONFIG.controls.forEach(c => {
            const th = document.createElement('th');
            th.innerHTML = `${c.id}<br><small style="color:#666;">${c.type}</small>`;
            hRow.insertBefore(th, totalTh);
        });
        onValue(ref(db, 'GEOSCATTER'), (snap) => {
            const data = snap.val();
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            if (!data) return;

            Object.keys(data).sort((a,b) => (parseInt(a.split('_')[1])||0) - (parseInt(b.split('_')[1])||0)).forEach(carKey => {
                const carData = data[carKey];
                let visits = 0, isViolator = false, rowHtml = `<td class="sticky-col">${carKey.split('_')[1]}</td>`;

                ROUTE_CONFIG.controls.forEach(ctrl => {
                    const rec = carData[ctrl.id];
                    if (rec) {
                        visits++;
                        let content = `<span class="stamp-time">${rec.time}</span>`;
                        if (rec.avgSpeed) content += `<br><span style="color:var(--accent);font-size:10px;">${rec.avgSpeed} MPH</span>`;
                        if (rec.violation) { content = `<span style="color:var(--danger)">⚠️ X</span>`; isViolator = true; }
                        rowHtml += `<td>${content}</td>`;
                    } else { rowHtml += `<td>---</td>`; }
                });

                rowHtml += `<td class="total-count">${visits}/${ROUTE_CONFIG.controls.length}</td>`;
                const tr = document.createElement('tr');
                if (isViolator) tr.className = "violation-row";
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
            document.getElementById('status-text').textContent = `SYNCED: ${new Date().toLocaleTimeString()}`;
        });
    }
    initTable();
</script>
</body>
</html>
