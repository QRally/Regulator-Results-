<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGULATOR | WAMC SCORING</title>
    <style>
        :root { --bg: #050505; --accent: #f1c40f; --text: #eee; --safe: #2ecc71; --late: #e74c3c; --early: #3498db; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .live-indicator { float: right; font-size: 10px; color: var(--safe); font-weight: bold; }
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #222; border-radius: 4px; background: #0a0a0a; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #111; color: var(--accent); padding: 12px; text-align: left; font-size: 10px; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; }
        .marks { font-size: 11px; display: block; margin-top: 4px; font-weight: bold; }
        .is-late { color: var(--late); }
        .is-early { color: var(--early); }
        .is-clean { color: var(--safe); }
        .total-box { background: #111; font-weight: bold; color: var(--accent); text-align: center; border-left: 2px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <div class="live-indicator">● SCORING ENGINE ACTIVE</div>
        <h1 id="event-title" style="font-size:1.2rem; margin:0; color:var(--accent);">SYNCING...</h1>
        <div id="master-clock" style="font-size:10px; color:#666; margin-top:5px;">Waiting for route...</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr id="table-header">
                    <th style="position:sticky; left:0; background:#111; z-index:10;">CAR #</th>
                    <th class="total-box">TOTAL</th>
                </tr>
            </thead>
            <tbody id="results-body">
                <tr><td colspan="2" style="text-align:center; padding:40px; color:#444;">Connecting to Firebase...</td></tr>
            </tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // MASTER SETTINGS
    const MASTER_START = "13:30:00"; 
    const INTERVAL = 1;

    const firebaseConfig = {
        apiKey: "AIzaSyCLi3NMmoJJCeJFGU4d-N4R47D0qM1r8nU",
        authDomain: "the-regulator-rally.firebaseapp.com",
        databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "the-regulator-rally",
        storageBucket: "the-regulator-rally.appspot.com",
        messagingSenderId: "1026958520151",
        appId: "1:1026958520151:web:166551b9b18361668f447d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let route = null;

        async function init() {
        // Try these two common GitHub Pages paths
        const paths = [
            './route.json',
            'https://qrally.github.io/regulator/route.json'
        ];
        
        let success = false;

        for (let path of paths) {
            try {
                console.log("Checking path:", path);
                const resp = await fetch(path + '?t=' + Date.now());
                if (resp.ok) {
                    route = await resp.json();
                    success = true;
                    break; 
                }
            } catch (e) {
                console.log("Path failed:", path);
            }
        }

        if (success) {
            // Populate the Dashboard
            document.getElementById('event-title').textContent = route.event_name;
            document.getElementById('master-clock').textContent = "CAR 0 DEPARTS: " + MASTER_START;
            
            const hRow = document.getElementById('table-header');
            const totalTh = hRow.querySelector('.total-box');
            route.controls.forEach(c => {
                const th = document.createElement('th');
                th.innerHTML = `${c.id}<br><small style="color:#666">${c.type === 'TIME' ? c.target_mins+'m Sch' : 'Passage'}</small>`;
                hRow.insertBefore(th, totalTh);
            });
            startListening();
        } else {
            document.getElementById('event-title').textContent = "ROUTE NOT FOUND";
            document.getElementById('master-clock').textContent = "Check GitHub Pages settings for 'regulator' repo.";
        }
    }


    function calculateMarks(actualTimeStr, carNum, targetMins, type) {
        if (!actualTimeStr) return { marks: 0, html: '<span style="color:#333">---</span>' };
        if (type === "PASSAGE") return { marks: 0, html: '<span style="color:var(--safe)">OK</span>' };

        const [h, m, s] = MASTER_START.split(':').map(Number);
        const carStartOffset = parseInt(carNum) * INTERVAL;
        const due = new Date(2026, 3, 1, h, m + carStartOffset + (targetMins || 0), s);
        
        const [ah, am, as] = actualTimeStr.split(':').map(Number);
        const actual = new Date(2026, 3, 1, ah, am, as);

        const diffSeconds = (actual - due) / 1000;
        const diffMins = Math.floor(Math.abs(diffSeconds) / 60);

        if (diffSeconds > 30) { 
            return { marks: diffMins, html: `${actualTimeStr}<span class="marks is-late">${diffMins}L</span>` };
        } else if (diffSeconds < -30) {
            return { marks: diffMins * 2, html: `${actualTimeStr}<span class="marks is-early">${diffMins * 2}E</span>` };
        }
        return { marks: 0, html: `${actualTimeStr}<span class="marks is-clean">0M</span>` };
    }

    function startListening() {
        onValue(ref(db, 'Rally_Test'), (snap) => {
            const data = snap.val();
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            if (!data) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:20px; color:#444;">No data in Firebase "Rally_Test"</td></tr>';
                return;
            }

            Object.keys(data).sort((a,b) => parseInt(a.replace('Car_','')) - parseInt(b.replace('Car_',''))).forEach(carKey => {
                const carData = data[carKey];
                const carNum = carKey.replace('Car_', '');
                let rowTotal = 0;
                let rowHtml = `<td style="font-weight:bold; color:var(--accent); position:sticky; left:0; background:#0a0a0a;">${carNum}</td>`;

                route.controls.forEach(c => {
                    const result = calculateMarks(carData[c.id], carNum, c.target_mins, c.type);
                    rowTotal += result.marks;
                    rowHtml += `<td>${result.html}</td>`;
                });

                rowHtml += `<td class="total-box">${rowTotal}</td>`;
                const tr = document.createElement('tr');
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
        });
    }

    init();
</script>
</body>
</html>
